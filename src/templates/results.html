<!DOCTYPE html>
<html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
  <title>Aegis Vision</title>
</head>
<body>
	<div id="content">
        {% if item %}
            <h1>Results for {{ image_id }}</h1>
            <img src="{{ image_url }}" style="max-width: 600px;">
            <h3>Detections:</h3>
            <ul>
                {% for obj in item.objects %}
                    <li>{{ obj.label }} ({{ (obj.confidence * 100)|round(1) }}%)</li>
                {% endfor %}
            </ul>
	    <a href="/">Return Home</a>
        {% else %}
            <div style="text-align: center; margin-top: 50px;">
                <h2>Processing your image...</h2>
                <p>This usually takes 2-3 seconds. Please wait.</p>
                <div class="loader"></div> </div>

            <script>
                // Poll the page every 3 seconds if data isn't ready
                setTimeout(function() {
                    window.location.reload();
                }, 2000);
            </script>
        {% endif %}
</body>
</html>
