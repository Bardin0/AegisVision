<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/index.css') }}">
  <title>Aegis Vision</title>
</head>
<body>
  <h1>Aegis Vision</h1>
  <p>Upload your image</p>
  <form action="/upload" method="post" enctype="multipart/form-data" class="upload-form">
    <img id="output" src="" alt="Image preview" width="600" class="image-preview"/>
    <input type="file" name="image" accept="image/*" onchange="loadFile(event)" id="fileInput" required>
    <button type="submit">Upload</button>
  </form>
  
</body>

<script>
  var loadFile = function(event) {
    var image = document.getElementById('output');
    image.style.display = 'block';
    // Create a temporary URL for the selected file
    image.src = URL.createObjectURL(event.target.files[0]);
    image.onload = function() {
        // Free up memory after the image is loaded
        URL.revokeObjectURL(image.src) 
    }
};
</script>

</html>
